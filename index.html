<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteMap</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,.15),
    transparent 35%),
    linear-gradient(135deg,#8a6a4d,#6f533d);

    padding:20px;
}

.container{
    max-width:520px;
    margin:auto;
}

.card{

    margin-bottom:20px;

    padding:24px;

    color:white;

    border-radius:30px;

    background:rgba(255,255,255,.18);

    border:1px solid rgba(255,255,255,.25);

    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);
}

.logo{

    text-align:center;

    font-size:2rem;
    font-weight:700;
}

.subtitle{

    text-align:center;

    opacity:.8;

    margin-top:6px;
}

.timer{

    text-align:center;

    font-size:3rem;
    font-weight:200;

    margin:24px 0;
}

.record-btn{

    width:120px;
    height:120px;

    display:block;
    margin:auto;

    border:none;
    border-radius:50%;

    cursor:pointer;

    background:
    radial-gradient(circle at 30% 30%,
    #5e9a70,#346344);
}

.record-btn.recording{

    background:
    radial-gradient(circle at 30% 30%,
    #ff7777,#d62828);
}

.record-dot{

    width:28px;
    height:28px;

    background:white;

    border-radius:50%;

    margin:auto;
}

.status{

    text-align:center;

    margin-top:20px;
}

audio{

    width:100%;

    margin-top:20px;
}

.section-title{

    font-size:1.2rem;

    margin-bottom:12px;
}

.record-list{

    display:flex;
    flex-direction:column;

    gap:12px;
}

.record-item{

    padding:12px;

    border-radius:18px;

    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.15);
}

.record-name{
    font-weight:600;
}

.record-date{

    opacity:.7;

    font-size:.85rem;

    margin-top:4px;
}

.record-actions{

    display:flex;

    gap:8px;

    margin-top:10px;
}

.small-btn{

    padding:8px 12px;

    border:none;

    border-radius:10px;

    cursor:pointer;
}

/* モーダル */

.modal-overlay{

    position:fixed;

    inset:0;

    display:none;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.35);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    z-index:999;
}

.modal{

    width:min(90vw,340px);

    padding:22px;

    border-radius:24px;

    background:rgba(255,255,255,.18);

    border:1px solid rgba(255,255,255,.25);

    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);

    color:white;
}

.modal-title{

    font-size:1.2rem;

    font-weight:700;

    margin-bottom:10px;
}

.modal-message{

    margin-bottom:15px;
}

.modal-input{

    width:100%;

    padding:12px;

    border:none;

    border-radius:12px;

    margin-bottom:15px;
}

.modal-buttons{

    display:flex;

    gap:10px;
}

.modal-btn{

    flex:1;

    padding:12px;

    border:none;

    border-radius:12px;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
NoteMap
</div>

<div class="subtitle">
録音
</div>

<div class="timer" id="timer">
00:00
</div>

<button
id="recordBtn"
class="record-btn">

<div class="record-dot"></div>

</button>

<div
id="status"
class="status">

タップして録音開始

</div>

<audio
id="player"
controls>
</audio>

</div>

<div class="card">

<div class="section-title">
録音一覧
</div>

<div
id="recordList"
class="record-list">
</div>

</div>

</div>

<!-- モーダル -->

<div
id="modalOverlay"
class="modal-overlay">

<div class="modal">

<div
id="modalTitle"
class="modal-title">
タイトル
</div>

<div
id="modalMessage"
class="modal-message">
メッセージ
</div>

<input
id="modalInput"
class="modal-input"
type="text">

<div class="modal-buttons">

<button
id="modalCancel"
class="modal-btn">

キャンセル

</button>

<button
id="modalOk"
class="modal-btn">

OK

</button>

</div>

</div>

</div>
<script>

let mediaRecorder;
let currentStream;
let chunks = [];

let recording = false;

let seconds = 0;
let timerInterval;

let db;

const btn =
document.getElementById(
"recordBtn"
);

const timer =
document.getElementById(
"timer"
);

const statusText =
document.getElementById(
"status"
);

const player =
document.getElementById(
"player"
);

const recordList =
document.getElementById(
"recordList"
);

/* モーダル */

const modalOverlay =
document.getElementById(
"modalOverlay"
);

const modalTitle =
document.getElementById(
"modalTitle"
);

const modalMessage =
document.getElementById(
"modalMessage"
);

const modalInput =
document.getElementById(
"modalInput"
);

const modalCancel =
document.getElementById(
"modalCancel"
);

const modalOk =
document.getElementById(
"modalOk"
);

let modalResolve;

/* タイマー */

function updateTimer(){

    const m =
    String(
    Math.floor(
    seconds / 60
    )
    ).padStart(
    2,
    "0"
    );

    const s =
    String(
    seconds % 60
    ).padStart(
    2,
    "0"
    );

    timer.textContent =
    `${m}:${s}`;
}

/* モーダル */

function closeModal(){

    modalOverlay.style.display =
    "none";
}

function showConfirm(
title,
message
){

    return new Promise(
    resolve=>{

        modalResolve =
        resolve;

        modalTitle.textContent =
        title;

        modalMessage.textContent =
        message;

        modalInput.style.display =
        "none";

        modalOverlay.style.display =
        "flex";

    }
    );

}

function showPrompt(
title,
message,
defaultValue=""
){

    return new Promise(
    resolve=>{

        modalResolve =
        resolve;

        modalTitle.textContent =
        title;

        modalMessage.textContent =
        message;

        modalInput.style.display =
        "block";

        modalInput.value =
        defaultValue;

        modalOverlay.style.display =
        "flex";

        modalInput.focus();

    }
    );

}

modalCancel.onclick =
()=>{

    closeModal();

    if(
    modalResolve
    ){

        modalResolve(
        null
        );

    }

};

modalOk.onclick =
()=>{

    const value =

    modalInput.style.display
    ===
    "none"

    ?

    true

    :

    modalInput.value;

    closeModal();

    if(
    modalResolve
    ){

        modalResolve(
        value
        );

    }

};

/* IndexedDB */

const request =
indexedDB.open(
"NoteMapDB",
1
);

request.onupgradeneeded =
(event)=>{

    db =
    event.target.result;

    db.createObjectStore(
    "records",
    {
        keyPath:"id",
        autoIncrement:true
    });

};

request.onsuccess =
(event)=>{

    db =
    event.target.result;

    loadRecords();

};

request.onerror =
()=>{

    alert(
    "データベースエラー"
    );

};

function saveRecord(
blob
){

    const transaction =
    db.transaction(
    ["records"],
    "readwrite"
    );

    const store =
    transaction.objectStore(
    "records"
    );

    store.add({

        name:
        "録音 " +
        new Date()
        .toLocaleString(
        "ja-JP"
        ),

        date:
        new Date()
        .toISOString(),

        blob:
        blob

    });

    transaction.oncomplete =
    ()=>{

        loadRecords();

    };

}

/* 録音 */

btn.addEventListener(
"click",
async ()=>{

    if(
    !recording
    ){

        try{

            currentStream =
            await navigator
            .mediaDevices
            .getUserMedia({

                audio:true

            });

            chunks = [];

            let options = {};

            if(
            MediaRecorder
            .isTypeSupported(
            "audio/mp4"
            )
            ){

                options.mimeType =
                "audio/mp4";

            }

            mediaRecorder =
            new MediaRecorder(
            currentStream,
            options
            );

            mediaRecorder
            .ondataavailable =
            e=>{

                if(
                e.data.size > 0
                ){

                    chunks.push(
                    e.data
                    );

                }

            };
                        mediaRecorder.onstop =
            ()=>{

                const blob =
                new Blob(
                chunks,
                {
                    type:
                    options.mimeType ||
                    "audio/mp4"
                });

                const url =
                URL.createObjectURL(
                blob
                );

                player.src =
                url;

                player.load();

                saveRecord(
                blob
                );

                if(
                currentStream
                ){

                    currentStream
                    .getTracks()
                    .forEach(
                    track =>
                    track.stop()
                    );

                }

            };

            mediaRecorder.start(
            1000
            );

            recording =
            true;

            btn.classList.add(
            "recording"
            );

            statusText.textContent =
            "録音中";

            seconds = 0;

            updateTimer();

            timerInterval =
            setInterval(
            ()=>{

                seconds++;

                updateTimer();

            },
            1000
            );

        }catch(err){

            console.error(
            err
            );

        }

    }else{

        mediaRecorder
        .requestData();

        setTimeout(
        ()=>{

            mediaRecorder
            .stop();

        },
        300
        );

        clearInterval(
        timerInterval
        );

        recording =
        false;

        btn.classList.remove(
        "recording"
        );

        statusText.textContent =
        "録音完了";

    }

});

updateTimer();

/* 一覧表示 */

function loadRecords(){

    recordList.innerHTML =
    "";

    const transaction =
    db.transaction(
    ["records"],
    "readonly"
    );

    const store =
    transaction.objectStore(
    "records"
    );

    const request =
    store.getAll();

    request.onsuccess =
    ()=>{

        const records =
        request.result
        .reverse();

        records.forEach(
        record=>{

            createRecordCard(
            record
            );

        });

    };

}

function createRecordCard(
record
){

    const item =
    document.createElement(
    "div"
    );

    item.className =
    "record-item";

    const name =
    document.createElement(
    "div"
    );

    name.className =
    "record-name";

    name.textContent =
    record.name;

    const date =
    document.createElement(
    "div"
    );

    date.className =
    "record-date";

    date.textContent =
    new Date(
    record.date
    ).toLocaleString(
    "ja-JP"
    );

    const actions =
    document.createElement(
    "div"
    );

    actions.className =
    "record-actions";

    /* 再生 */

    const playBtn =
    document.createElement(
    "button"
    );

    playBtn.className =
    "small-btn";

    playBtn.textContent =
    "再生";

    playBtn.onclick =
    ()=>{

        const url =
        URL.createObjectURL(
        record.blob
        );

        player.src =
        url;

        player.load();

        player.play()
        .catch(
        console.error
        );

    };

    /* 名前変更 */

    const renameBtn =
    document.createElement(
    "button"
    );

    renameBtn.className =
    "small-btn";

    renameBtn.textContent =
    "名前変更";

    renameBtn.onclick =
    async ()=>{

        const newName =
        await showPrompt(
        "名前変更",
        "新しい名前を入力",
        record.name
        );

        if(
        !newName
        ){
            return;
        }

        record.name =
        newName;

        const transaction =
        db.transaction(
        ["records"],
        "readwrite"
        );

        const store =
        transaction
        .objectStore(
        "records"
        );

        store.put(
        record
        );

        transaction.oncomplete =
        ()=>{

            loadRecords();

        };

    };

    /* 削除 */

    const deleteBtn =
    document.createElement(
    "button"
    );

    deleteBtn.className =
    "small-btn";

    deleteBtn.textContent =
    "削除";

    deleteBtn.onclick =
    async ()=>{

        const ok =
        await showConfirm(
        "削除確認",
        "この録音を削除しますか？"
        );

        if(
        !ok
        ){
            return;
        }

        const transaction =
        db.transaction(
        ["records"],
        "readwrite"
        );

        const store =
        transaction
        .objectStore(
        "records"
        );

        store.delete(
        record.id
        );

        transaction.oncomplete =
        ()=>{

            loadRecords();

        };

    };

    actions.appendChild(
    playBtn
    );

    actions.appendChild(
    renameBtn
    );

    actions.appendChild(
    deleteBtn
    );

    item.appendChild(
    name
    );

    item.appendChild(
    date
    );

    item.appendChild(
    actions
    );

    recordList.appendChild(
    item
    );

}

</script>

</body>
</html>
