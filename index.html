<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteMap</title>

<style>
body{
font-family:-apple-system;
background:linear-gradient(135deg,#8a6a4d,#6f533d);
padding:20px;
color:white;
}

.card{
background:rgba(255,255,255,.18);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
margin-bottom:15px;
}

.record-btn{
width:110px;
height:110px;
border-radius:50%;
border:none;
display:block;
margin:auto;
background:#346344;
}

.recording{
background:#d62828;
}

button{
border:none;
padding:8px 10px;
border-radius:10px;
margin:4px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>NoteMap</h2>

<div id="timer">00:00</div>

<button id="btn" class="record-btn"></button>

<div id="status">タップで録音</div>

<audio id="player" controls></audio>
</div>

<div class="card" id="list"></div>

<script>

let recorder;
let stream;
let chunks = [];
let recording = false;

let seconds = 0;
let timerId;

let db;
let wakeLock = null;

const btn = document.getElementById("btn");
const timer = document.getElementById("timer");
const status = document.getElementById("status");
const player = document.getElementById("player");
const list = document.getElementById("list");

/* ===== スリープ防止 ===== */

async function keepAwake(){

try{

if("wakeLock" in navigator){

wakeLock = await navigator.wakeLock.request("screen");

wakeLock.addEventListener("release",()=>{
console.log("WakeLock解除");
});

}

}catch(e){
console.log("WakeLock不可",e);
}

}

document.addEventListener("visibilitychange",async()=>{

if(document.visibilityState==="visible"){
keepAwake();
}

});

/* ===== DB ===== */

const req=indexedDB.open("note",1);

req.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("rec",{keyPath:"id",autoIncrement:true});
};

req.onsuccess=e=>{
db=e.target.result;
load();
};

/* ===== タイマー ===== */

function update(){
timer.textContent=
String(Math.floor(seconds/60)).padStart(2,"0")
+":"+String(seconds%60).padStart(2,"0");
}

/* ===== 録音 ===== */

btn.onclick=async()=>{

if(!recording){

await keepAwake();

stream=await navigator.mediaDevices.getUserMedia({audio:true});
chunks=[];

recorder=new MediaRecorder(stream);

recorder.ondataavailable=e=>{
chunks.push(e.data);
};

recorder.onstop=()=>{

const blob=new Blob(chunks,{type:"audio/webm"});
const url=URL.createObjectURL(blob);

db.transaction("rec","readwrite")
.objectStore("rec")
.add({
name:"録音 "+new Date().toLocaleString(),
url:url
});

load();

stream.getTracks().forEach(t=>t.stop());

player.src=url;

if(wakeLock){
wakeLock.release();
wakeLock=null;
}

};

recorder.start();

recording=true;
btn.classList.add("recording");
status.textContent="録音中";

seconds=0;
update();

timerId=setInterval(()=>{
seconds++;
update();
},1000);

}else{

recorder.stop();

clearInterval(timerId);

recording=false;
btn.classList.remove("recording");
status.textContent="録音完了";

}

};

/* ===== 一覧 ===== */

function load(){

if(!db)return;

list.innerHTML="";

db.transaction("rec")
.objectStore("rec")
.getAll().onsuccess=e=>{

e.target.result.reverse().forEach(r=>{

const div=document.createElement("div");

div.innerHTML=`
<div>${r.name}</div>
<button>再生</button>
<button>削除</button>
`;

const [play,del]=div.querySelectorAll("button");

play.onclick=()=>{
player.src=r.url;
player.play().catch(()=>{});
};

del.onclick=()=>{
db.transaction("rec","readwrite")
.objectStore("rec")
.delete(r.id);

load();
};

list.appendChild(div);

});

};

}

</script>

</body>
</html>
