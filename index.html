<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteMap</title>

<style>
body{
font-family:-apple-system;
background:linear-gradient(135deg,#8a6a4d,#6f533d);
padding:20px;
color:white;
}

.card{
background:rgba(255,255,255,.18);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
margin-bottom:15px;
}

button{
border:none;
padding:8px 12px;
border-radius:10px;
margin-right:6px;
cursor:pointer;
}

.record-btn{
width:110px;height:110px;
border-radius:50%;
background:#346344;
display:block;margin:auto;
}
.recording{background:#d62828;}
</style>
</head>

<body>

<div class="card">
<h2>NoteMap</h2>

<div id="timer">00:00</div>

<button id="btn" class="record-btn"></button>

<div id="status">タップで録音</div>

<audio id="player" controls></audio>
</div>

<div class="card" id="list"></div>

<script>

let recorder;
let stream;
let chunks=[];
let recording=false;
let seconds=0;
let timerId;

let db;

const btn=document.getElementById("btn");
const timer=document.getElementById("timer");
const status=document.getElementById("status");
const player=document.getElementById("player");
const list=document.getElementById("list");

/* ===== iOS対応：形式選択 ===== */

function getSupportedMime(){

if(MediaRecorder.isTypeSupported("audio/mp4")){
return "audio/mp4"; // iOS寄り
}

if(MediaRecorder.isTypeSupported("audio/aac")){
return "audio/aac";
}

return ""; // 最後の手段
}

/* ===== DB ===== */

const req=indexedDB.open("note",1);

req.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("rec",{keyPath:"id",autoIncrement:true});
};

req.onsuccess=e=>{
db=e.target.result;
load();
};

/* ===== 録音 ===== */

btn.onclick=async()=>{

if(!recording){

stream=await navigator.mediaDevices.getUserMedia({audio:true});

chunks=[];

const mime=getSupportedMime();

recorder=new MediaRecorder(
stream,
mime?{mimeType:mime}:{}
);

recorder.ondataavailable=e=>{
chunks.push(e.data);
};

recorder.onstop=()=>{

const blob=new Blob(chunks,{
type:mime||"audio/mp4"
});

/* ★重要：URL保存 */
const url=URL.createObjectURL(blob);

db.transaction("rec","readwrite")
.objectStore("rec")
.add({
name:"録音 "+new Date().toLocaleString(),
url:url
});

load();

stream.getTracks().forEach(t=>t.stop());

player.src=url;
};

recorder.start();

recording=true;
btn.classList.add("recording");
status.textContent="録音中";

seconds=0;
timerId=setInterval(()=>{
seconds++;
timer.textContent=
String(Math.floor(seconds/60)).padStart(2,"0")
+":"+String(seconds%60).padStart(2,"0");
},1000);

}else{

recorder.stop();
clearInterval(timerId);

recording=false;
btn.classList.remove("recording");
status.textContent="録音完了";
}

};

/* ===== 再生リスト ===== */

function load(){

if(!db)return;

list.innerHTML="";

db.transaction("rec")
.objectStore("rec")
.getAll().onsuccess=e=>{

e.target.result.reverse().forEach(r=>{

const div=document.createElement("div");
div.innerHTML=`
<div>${r.name}</div>
<button>再生</button>
`;

div.querySelector("button").onclick=()=>{
player.src=r.url;
player.play().catch(()=>alert("再生できない形式です"));
};

list.appendChild(div);

});

};

}

</script>

</body>
</html>
