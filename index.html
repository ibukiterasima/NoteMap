<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteMap</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    background:
    radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 35%),
    linear-gradient(135deg,#8a6a4d,#6f533d);

    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    repeating-linear-gradient(
        90deg,
        rgba(0,0,0,0.03) 0px,
        rgba(0,0,0,0.03) 2px,
        transparent 2px,
        transparent 20px
    );

    opacity:.6;
    pointer-events:none;
}

.card{
    width:min(92vw,420px);

    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);

    background:rgba(255,255,255,.18);

    border:1px solid rgba(255,255,255,.25);

    border-radius:32px;

    padding:32px 24px;

    box-shadow:
    0 8px 32px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.25);

    text-align:center;
}

.logo{
    font-size:2rem;
    font-weight:700;
    color:#fff;
    letter-spacing:.05em;
}

.subtitle{
    margin-top:6px;
    color:rgba(255,255,255,.8);
    font-size:.9rem;
}

.timer{
    margin:34px 0 28px;

    color:white;

    font-size:3.5rem;
    font-weight:200;

    letter-spacing:.08em;
}

.record-btn{
    width:110px;
    height:110px;

    border:none;
    border-radius:50%;

    cursor:pointer;

    background:
    radial-gradient(circle at 30% 30%,#5e9a70,#346344);

    box-shadow:
    0 10px 25px rgba(0,0,0,.25),
    inset 0 3px 8px rgba(255,255,255,.2);

    transition:.25s;
}

.record-btn:hover{
    transform:scale(1.05);
}

.record-btn.recording{
    background:
    radial-gradient(circle at 30% 30%,#ff7777,#d62828);

    animation:pulse 1.4s infinite;
}

.record-dot{
    width:28px;
    height:28px;
    border-radius:50%;
    background:white;
    margin:auto;
}

.status{
    margin-top:20px;
    color:white;
    font-size:1rem;
}

audio{
    width:100%;
    margin-top:28px;
    border-radius:14px;
}

@keyframes pulse{
    0%{
        box-shadow:
        0 0 0 0 rgba(255,60,60,.5),
        0 10px 25px rgba(0,0,0,.25);
    }

    70%{
        box-shadow:
        0 0 0 20px rgba(255,60,60,0),
        0 10px 25px rgba(0,0,0,.25);
    }

    100%{
        box-shadow:
        0 0 0 0 rgba(255,60,60,0),
        0 10px 25px rgba(0,0,0,.25);
    }
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">NoteMap</div>
    <div class="subtitle">録音</div>

    <div class="timer" id="timer">00:00</div>

    <button class="record-btn" id="recordBtn">
        <div class="record-dot"></div>
    </button>

    <div class="status" id="status">
        タップして録音開始
    </div>

    <audio id="player" controls></audio>

</div>

<script>
let mediaRecorder;
let chunks = [];
let recording = false;

let seconds = 0;
let timerInterval;

const btn = document.getElementById("recordBtn");
const timer = document.getElementById("timer");
const statusText = document.getElementById("status");
const player = document.getElementById("player");

function updateTimer(){
    const m = String(Math.floor(seconds/60)).padStart(2,"0");
    const s = String(seconds%60).padStart(2,"0");
    timer.textContent = `${m}:${s}`;
}

btn.addEventListener("click", async () => {

    if(!recording){

        try{

            const stream = await navigator.mediaDevices.getUserMedia({
                audio:true
            });

            mediaRecorder = new MediaRecorder(stream);
            chunks = [];

            mediaRecorder.ondataavailable = e=>{
                chunks.push(e.data);
            };

            mediaRecorder.onstop = ()=>{

                const blob = new Blob(chunks,{
                    type:"audio/webm"
                });

                const url = URL.createObjectURL(blob);
                player.src = url;
            };

            mediaRecorder.start();

            recording = true;

            btn.classList.add("recording");

            statusText.textContent = "録音中";

            seconds = 0;
            updateTimer();

            timerInterval = setInterval(()=>{
                seconds++;
                updateTimer();
            },1000);

        }catch(err){

            alert("マイクへのアクセスを許可してください");
            console.error(err);

        }

    }else{

        mediaRecorder.stop();

        clearInterval(timerInterval);

        recording = false;

        btn.classList.remove("recording");

        statusText.textContent = "録音完了";

    }

});
</script>

</body>
</html>
