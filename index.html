<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteMap</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,.15),
    transparent 35%),
    linear-gradient(135deg,#8a6a4d,#6f533d);

    padding:20px;
}

/* コンテナ */

.container{
    max-width:520px;
    margin:auto;
}

/* カード */

.card{

    margin-bottom:20px;

    padding:24px;

    color:white;

    border-radius:30px;

    background:rgba(255,255,255,.18);

    border:1px solid rgba(255,255,255,.25);

    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);
}

/* タイトル */

.logo{
    text-align:center;
    font-size:2rem;
    font-weight:700;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-top:6px;
}

/* タイマー */

.timer{
    text-align:center;
    font-size:3rem;
    font-weight:200;
    margin:24px 0;
}

/* 波 */

.wave-wrap{
    height:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:10px;
}

.wave{
    width:220px;
    height:24px;
}

.wave path{
    fill:none;
    stroke:white;
    stroke-width:2;
    opacity:.5;
    stroke-linecap:round;
}

/* 録音ボタン */

.record-btn{

    width:120px;
    height:120px;

    display:block;
    margin:auto;

    border:none;
    border-radius:50%;

    cursor:pointer;

    background:
    radial-gradient(circle at 30% 30%,
    #5e9a70,#346344);

    transition:.2s;
}

.record-btn.recording{
    background:
    radial-gradient(circle at 30% 30%,
    #ff7777,#d62828);
}

.record-dot{
    width:28px;
    height:28px;
    background:white;
    border-radius:50%;
    margin:auto;
}

/* ステータス */

.status{
    text-align:center;
    margin-top:20px;
}

/* オーディオ */

audio{
    width:100%;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">NoteMap</div>
        <div class="subtitle">録音</div>

        <div class="timer" id="timer">00:00</div>

        <!-- 波 -->
        <div class="wave-wrap">

            <svg class="wave" viewBox="0 0 200 20">
                <path id="wavePath"
                d="M0 10 Q 25 10 50 10 T 100 10 T 150 10 T 200 10"/>
            </svg>

        </div>

        <button id="recordBtn" class="record-btn">
            <div class="record-dot"></div>
        </button>

        <div class="status" id="status">
            タップして録音開始
        </div>

        <audio id="player" controls></audio>

    </div>

</div>

<script>

let mediaRecorder;
let currentStream;
let chunks = [];

let recording = false;

let seconds = 0;
let timerInterval;

let audioCtx;
let analyser;
let dataArray;
let source;

const btn =
document.getElementById("recordBtn");

const timer =
document.getElementById("timer");

const statusText =
document.getElementById("status");

const player =
document.getElementById("player");

const wavePath =
document.getElementById("wavePath");

/* タイマー */

function updateTimer(){

    const m =
    String(Math.floor(seconds / 60)).padStart(2,"0");

    const s =
    String(seconds % 60).padStart(2,"0");

    timer.textContent = `${m}:${s}`;
}

/* マイク開始 */

async function startMic(){

    currentStream =
    await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    audioCtx =
    new (window.AudioContext || window.webkitAudioContext)();

    source =
    audioCtx.createMediaStreamSource(currentStream);

    analyser =
    audioCtx.createAnalyser();

    analyser.fftSize = 512;

    source.connect(analyser);

    dataArray =
    new Uint8Array(analyser.frequencyBinCount);
}

/* 波のベース（あとで音で動かす） */

function setFlatWave(){

    wavePath.setAttribute(
    "d",
    "M0 10 Q 25 10 50 10 T 100 10 T 150 10 T 200 10"
    );

}

setFlatWave();

function startWave(){

    const draw = () => {

        if(!analyser) return;

        analyser.getByteTimeDomainData(dataArray);

        let sum = 0;

        for(let i=0;i<dataArray.length;i++){

            let v = dataArray[i] - 128;
            sum += v * v;

        }

        let volume =
        Math.sqrt(sum / dataArray.length);

        let amp =
        Math.min(volume / 18, 12);

        const y1 = 10 - amp;
        const y2 = 10 + amp * 0.6;
        const y3 = 10 - amp * 0.4;

        wavePath.setAttribute(
        "d",
        `M0 10
        Q 25 ${y1}
        50 10
        T 100 ${y2}
        T 150 ${y3}
        T 200 10`
        );

        requestAnimationFrame(draw);

    };

    draw();
}

/* 録音開始 */

btn.addEventListener("click", async ()=>{

    if(!recording){

        try{

            await startMic();

            chunks = [];

            let options = {};

            if(MediaRecorder.isTypeSupported("audio/mp4")){
                options.mimeType = "audio/mp4";
            }

            mediaRecorder =
            new MediaRecorder(currentStream, options);

            mediaRecorder.ondataavailable = (e)=>{

                if(e.data && e.data.size > 0){
                    chunks.push(e.data);
                }

            };

            mediaRecorder.onstop = ()=>{

                const blob =
                new Blob(chunks, {
                    type: options.mimeType || "audio/mp4"
                });

                const url =
                URL.createObjectURL(blob);

                player.src = url;
                player.load();

                if(currentStream){
                    currentStream.getTracks().forEach(t=>t.stop());
                }

                if(audioCtx){
                    audioCtx.close();
                }

            };

            mediaRecorder.start(1000);

            recording = true;

            btn.classList.add("recording");

            statusText.textContent = "録音中";

            seconds = 0;
            updateTimer();

            timerInterval =
            setInterval(()=>{
                seconds++;
                updateTimer();
            },1000);

            startWave(); // ★ここで波スタート

        }catch(err){
            console.error(err);
        }

    }else{

        mediaRecorder.stop();

        clearInterval(timerInterval);

        recording = false;

        btn.classList.remove("recording");

        statusText.textContent = "録音完了";
    }

});

updateTimer();

/* ===== IndexedDB ===== */

let db;

const request =
indexedDB.open("NoteMapDB",1);

request.onupgradeneeded = (e)=>{

    db = e.target.result;

    const store =
    db.createObjectStore("records",{
        keyPath:"id",
        autoIncrement:true
    });

};

request.onsuccess = (e)=>{

    db = e.target.result;

    loadRecords();

};

request.onerror = ()=>{

    console.log("DB error");

};

/* 保存 */

function saveRecord(blob){

    const tx =
    db.transaction(["records"],"readwrite");

    const store =
    tx.objectStore("records");

    store.add({

        name:
        "録音 " +
        new Date().toLocaleString("ja-JP"),

        date:
        new Date().toISOString(),

        blob:blob

    });

    tx.oncomplete = ()=>{

        loadRecords();

    };

}

/* 一覧読み込み */

function loadRecords(){

    // ※まだUIないけど後で使う

    const tx =
    db.transaction(["records"],"readonly");

    const store =
    tx.objectStore("records");

    const req =
    store.getAll();

    req.onsuccess = ()=>{

        const records =
        req.result.reverse();

        console.log("records:",records);

        // Part5で表示UI作る
    };

}

const recordList =
document.createElement("div");

document.body.appendChild(recordList);

/* UI用（簡易） */

function renderUI(){

    recordList.innerHTML = "";

    db.transaction(["records"],"readonly")
    .objectStore("records")
    .getAll().onsuccess = (e)=>{

        let records =
        e.target.result.reverse();

        records.forEach(record=>{

            const item =
            document.createElement("div");

            item.style.cssText =
            `
            background:rgba(255,255,255,.12);
            padding:12px;
            margin:10px;
            border-radius:16px;
            color:white;
            `;

            const title =
            document.createElement("div");

            title.textContent = record.name;

            const btnWrap =
            document.createElement("div");

            btnWrap.style.marginTop = "8px";

            /* 再生 */

            const play =
            document.createElement("button");

            play.textContent = "再生";

            play.onclick = ()=>{

                const url =
                URL.createObjectURL(record.blob);

                player.src = url;
                player.play();

            };

            /* 削除 */

            const del =
            document.createElement("button");

            del.textContent = "削除";

            del.onclick = ()=>{

                const tx =
                db.transaction(["records"],"readwrite");

                tx.objectStore("records")
                .delete(record.id);

                tx.oncomplete = ()=>{

                    renderUI();

                };

            };

            btnWrap.appendChild(play);
            btnWrap.appendChild(del);

            item.appendChild(title);
            item.appendChild(btnWrap);

            recordList.appendChild(item);

        });

    };

}

/* 保存後にUI更新 */

function saveRecord(blob){

    const tx =
    db.transaction(["records"],"readwrite");

    tx.objectStore("records").add({

        name:
        "録音 " +
        new Date().toLocaleString("ja-JP"),

        date:
        new Date().toISOString(),

        blob:blob

    });

    tx.oncomplete = ()=>{

        renderUI();

    };

}

/* 初期ロード */

request.onsuccess = (e)=>{

    db = e.target.result;

    renderUI();

};

/* 録音停止時に保存呼び出し（重要） */

mediaRecorder.onstop = ()=>{

    const blob =
    new Blob(chunks,{
        type:"audio/mp4"
    });

    saveRecord(blob);

};
