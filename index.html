<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteMap</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:
    radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 35%),
    linear-gradient(135deg,#8a6a4d,#6f533d);
}

.card{
    width:min(92vw,420px);
    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.25);
    border-radius:32px;
    padding:32px 24px;
    text-align:center;
    color:white;
}

.logo{
    font-size:2rem;
    font-weight:700;
}

.subtitle{
    margin-top:6px;
    opacity:.8;
}

.timer{
    margin:30px 0;
    font-size:3.5rem;
    font-weight:200;
}

.record-btn{
    width:110px;
    height:110px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:
    radial-gradient(circle at 30% 30%,#5e9a70,#346344);
    margin:auto;
}

.record-btn.recording{
    background:
    radial-gradient(circle at 30% 30%,#ff7777,#d62828);
}

.record-dot{
    width:28px;
    height:28px;
    border-radius:50%;
    background:white;
    margin:auto;
}

.status{
    margin-top:20px;
}

audio{
    width:100%;
    margin-top:25px;
}

.debug{
    margin-top:15px;
    font-size:12px;
    word-break:break-all;
    opacity:.8;
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">NoteMap</div>
    <div class="subtitle">録音</div>

    <div class="timer" id="timer">00:00</div>

    <button class="record-btn" id="recordBtn">
        <div class="record-dot"></div>
    </button>

    <div class="status" id="status">
        タップして録音開始
    </div>

    <audio id="player" controls></audio>

    <div class="debug" id="debug"></div>

</div>

<script>
let mediaRecorder;
let chunks = [];
let recording = false;

let seconds = 0;
let timerInterval;

const btn = document.getElementById("recordBtn");
const timer = document.getElementById("timer");
const statusText = document.getElementById("status");
const player = document.getElementById("player");
const debug = document.getElementById("debug");

function updateTimer(){
    const m = String(Math.floor(seconds/60)).padStart(2,"0");
    const s = String(seconds%60).padStart(2,"0");
    timer.textContent = `${m}:${s}`;
}

btn.addEventListener("click", async () => {

    if(!recording){

        try{

            const stream = await navigator.mediaDevices.getUserMedia({
                audio:true
            });

            chunks = [];

            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = (e)=>{
                if(e.data.size > 0){
                    chunks.push(e.data);
                }
            };

            mediaRecorder.onstop = ()=>{

                const blob = new Blob(chunks);

                debug.textContent =
                    "type: " + blob.type +
                    " | size: " + blob.size + " bytes";

                const url = URL.createObjectURL(blob);

                player.src = url;
                player.load();
            };

            mediaRecorder.start(1000);

            recording = true;

            btn.classList.add("recording");

            statusText.textContent = "録音中";

            seconds = 0;
            updateTimer();

            timerInterval = setInterval(()=>{
                seconds++;
                updateTimer();
            },1000);

        }catch(err){

            alert("マイクへのアクセスを許可してください");
            console.error(err);

        }

    }else{

        mediaRecorder.stop();

        clearInterval(timerInterval);

        recording = false;

        btn.classList.remove("recording");

        statusText.textContent = "録音完了";
    }

});
</script>

</body>
</html>
