<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteMap</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#8a6a4d,#6f533d);
padding:20px;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:rgba(255,255,255,.18);
border:1px solid rgba(255,255,255,.25);
backdrop-filter:blur(20px);
border-radius:24px;
padding:24px;
color:white;
margin-bottom:16px;
}

.logo{
text-align:center;
font-size:2rem;
font-weight:700;
}

.subtitle{
text-align:center;
opacity:.8;
margin-top:6px;
}

.timer{
text-align:center;
font-size:3rem;
margin:24px 0;
}

.record-btn{
width:120px;
height:120px;
border:none;
border-radius:50%;
display:block;
margin:auto;
cursor:pointer;
background:radial-gradient(circle at 30% 30%,#5e9a70,#346344);
}

.record-btn.recording{
background:radial-gradient(circle at 30% 30%,#ff7777,#d62828);
}

.record-dot{
width:28px;
height:28px;
background:white;
border-radius:50%;
margin:auto;
}

.status{
text-align:center;
margin-top:20px;
}

audio{
width:100%;
margin-top:20px;
}

.record-item{
padding:12px;
border-radius:14px;
background:rgba(255,255,255,.12);
margin-top:10px;
}

button.small{
margin-top:8px;
padding:6px 10px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">NoteMap</div>
<div class="subtitle">録音</div>

<div class="timer" id="timer">00:00</div>

<button id="btn" class="record-btn">
<div class="record-dot"></div>
</button>

<div class="status" id="status">タップで録音</div>

<audio id="player" controls></audio>

</div>

<div class="card">
<div id="list"></div>
</div>

</div>

<script>

let mediaRecorder;
let stream;
let chunks = [];
let recording = false;

let seconds = 0;
let timerId;

let db;

const btn = document.getElementById("btn");
const timer = document.getElementById("timer");
const status = document.getElementById("status");
const player = document.getElementById("player");
const list = document.getElementById("list");

/* タイマー */

function update(){
const m = String(Math.floor(seconds/60)).padStart(2,"0");
const s = String(seconds%60).padStart(2,"0");
timer.textContent = `${m}:${s}`;
}

/* DB */

const req = indexedDB.open("NoteMap",1);

req.onupgradeneeded = e=>{
db = e.target.result;
db.createObjectStore("rec",{keyPath:"id",autoIncrement:true});
};

req.onsuccess = e=>{
db = e.target.result;
load();
};

/* 録音 */

btn.onclick = async ()=>{

if(!recording){

stream = await navigator.mediaDevices.getUserMedia({audio:true});

chunks = [];

mediaRecorder = new MediaRecorder(stream);

mediaRecorder.ondataavailable = e=>{
chunks.push(e.data);
};

mediaRecorder.onstop = ()=>{

const blob = new Blob(chunks,{type:"audio/webm"});
const url = URL.createObjectURL(blob);

player.src = url;

db.transaction("rec","readwrite")
.objectStore("rec")
.add({
name:"録音 "+new Date().toLocaleString(),
blob:blob
});

load();

if(stream){
stream.getTracks().forEach(t=>t.stop());
}

};

mediaRecorder.start();

recording = true;

btn.classList.add("recording");

status.textContent = "録音中";

seconds = 0;
update();

timerId = setInterval(()=>{
seconds++;
update();
},1000);

}else{

mediaRecorder.stop();

clearInterval(timerId);

recording = false;

btn.classList.remove("recording");

status.textContent = "録音完了";

}

};

/* 一覧 */

function load(){

if(!db) return;

list.innerHTML = "";

db.transaction("rec")
.objectStore("rec")
.getAll().onsuccess = e=>{

e.target.result.reverse().forEach(r=>{

const div = document.createElement("div");
div.className="record-item";

const url = URL.createObjectURL(r.blob);

div.innerHTML = `
<div>${r.name}</div>
<button class="small">再生</button>
`;

div.querySelector("button").onclick=()=>{
player.src=url;
player.play();
};

list.appendChild(div);

});

};

}

update();

</script>

</body>
</html>
